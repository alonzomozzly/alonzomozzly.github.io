<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Charge — трекер сушки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>

:root{
  --bg:#f4f4f7; --bg-elevated:rgba(255,255,255,.92); --card:#ffffff; --card-2:#eeeef2;
  --text:#17171a; --text-secondary:#8b8b93; --text-tertiary:#c2c2c8; --divider:#ececef;
  --accent-1:#ffc247; --accent-2:#ff8a1e; --accent:#ff9c1a; --accent-soft:#fff3e0; --on-accent:#1a1200;
  --blue:#0a84ff; --pink:#ff2d78; --green:#34c759; --red:#ff3b30;
  --chip:#26262c; --chip-text:#ffffff;
  --glass-bg:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.45));
  --glass-border:rgba(255,255,255,.65); --glass-inner:rgba(255,255,255,.8);
  --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.07);
  --shadow-lg:0 12px 40px rgba(20,20,30,.12);
  --radius:22px; --radius-sm:14px;
  --spring:cubic-bezier(.34,1.45,.5,1); --ease-out:cubic-bezier(.22,1,.36,1);
  color-scheme:light;
}
:root.dark{
  --bg:#0a0a0c; --bg-elevated:rgba(20,20,24,.9); --card:#17171b; --card-2:#222228;
  --text:#f5f5f7; --text-secondary:#93939c; --text-tertiary:#55555c; --divider:#26262b;
  --accent-soft:#2b2013;
  --chip:#2c2c33; --chip-text:#ffffff;
  --glass-bg:linear-gradient(135deg,rgba(52,52,62,.55),rgba(28,28,34,.42));
  --glass-border:rgba(255,255,255,.14); --glass-inner:rgba(255,255,255,.16);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  --shadow-lg:0 16px 48px rgba(0,0,0,.5);
  color-scheme:dark;
}
/* Красный акцент с лёгким серебристым отливом */
:root.accent-red{
  --accent-1:#ff6f63; --accent-2:#e0271a; --accent:#f2372a; --accent-soft:#ffe9e7; --on-accent:#ffffff;
}
:root.dark.accent-red{ --accent-soft:#301412; }
:root.accent-red .btn-primary{ box-shadow:0 10px 24px -8px rgba(226,45,32,.5); }
:root.accent-red .action-btn.primary{
  background:linear-gradient(115deg,#ff7a6e 0%, #e8352a 36%, #ffffff 50%, #e8352a 64%, #b31e14 100%);
  background-size:280% 280%; box-shadow:0 10px 26px -8px rgba(226,45,32,.55);
}
/* Монолит — очень тёмно-серый с серебристым отливом */
:root.accent-mono{
  --accent-1:#5a5e66; --accent-2:#2b2d32; --accent:#3a3d43; --accent-soft:#e9eaee; --on-accent:#ffffff;
}
:root.dark.accent-mono{ --accent-soft:#232428; --accent:#9aa1ab; --accent-1:#787d86; --accent-2:#4a4d54; }
:root.accent-mono .btn-primary{ box-shadow:0 10px 24px -8px rgba(15,17,20,.5); }
:root.accent-mono .action-btn.primary{
  background:linear-gradient(115deg,#54575f 0%, #2a2c31 36%, #ffffff 50%, #2a2c31 64%, #1b1d21 100%);
  background-size:280% 280%; box-shadow:0 10px 26px -8px rgba(15,17,20,.6);
}
:root.accent-mono .action-btn.primary .action-icon{ color:#fff; }

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','SF Pro',system-ui,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  font-feature-settings:'kern' 1; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  background:var(--bg); color:var(--text); overscroll-behavior:none;
  transition:background .4s ease, color .4s ease;
}
#app{ max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:96px; }
#app.appear{ animation:appIn .6s var(--ease-out) both; }
@keyframes appIn{ from{ opacity:0; filter:blur(14px); transform:scale(1.03); } to{ opacity:1; filter:blur(0); transform:none; } }
button{ font-family:inherit; }
input,textarea,select{ font-family:inherit; }
.hidden{ display:none !important; }

/* ---------- Живые нажатия ---------- */
button, .pressable{ transition:transform .4s var(--spring), box-shadow .4s var(--spring), opacity .2s ease, background .3s ease; }
button:active, .pressable:active{ transform:scale(.96); transition-duration:.08s; }

/* ---------- Splash ---------- */
#splash{ position:fixed; inset:0; background:linear-gradient(125deg,#d7d7d8 0%,#ececed 48%,#f2f2f3 100%); z-index:1000; display:flex; align-items:center; justify-content:center; overflow:hidden; transition:opacity .45s ease; }
#splash.out{ opacity:0; pointer-events:none; }
#splash video{ width:100vw; max-width:640px; height:auto; display:block; -webkit-mask-image:radial-gradient(ellipse 62% 58% at 50% 46%, #000 55%, transparent 84%); mask-image:radial-gradient(ellipse 62% 58% at 50% 46%, #000 55%, transparent 84%); }

/* ---------- Onboarding ---------- */
.ob-screen{ min-height:100vh; display:flex; flex-direction:column; padding:24px 22px 28px; }
.ob-dots{ display:flex; gap:6px; margin-bottom:28px; }
.ob-dot{ height:4px; flex:1; border-radius:4px; background:var(--divider); overflow:hidden; }
.ob-dot i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent-1),var(--accent-2)); transition:width .4s var(--ease-out); }
.ob-back{ width:36px; height:36px; border-radius:50%; border:none; background:var(--card); display:flex; align-items:center; justify-content:center; margin-bottom:18px; color:var(--text); font-size:18px; cursor:pointer; }
.ob-title{ font-size:28px; font-weight:800; letter-spacing:-.02em; margin:6px 0 6px; }
.ob-sub{ font-size:15px; color:var(--text-secondary); margin-bottom:28px; line-height:1.4; }
.ob-body{ flex:1; display:flex; flex-direction:column; }
.ob-footer{ margin-top:auto; padding-top:16px; }
.gender-row{ display:flex; gap:12px; margin-top:8px; }
.gender-card{ flex:1; border-radius:var(--radius); background:var(--card); border:2px solid transparent; padding:26px 16px; text-align:center; cursor:pointer; }
.gender-card.active{ border-color:var(--accent); background:var(--accent-soft); }
.gender-symbol{ font-size:38px; font-weight:700; display:block; margin-bottom:10px; }
.gender-symbol.male{ color:var(--blue); } .gender-symbol.female{ color:var(--pink); }
.gender-label{ font-size:16px; font-weight:600; }
.wheel-wrap{ position:relative; margin:20px 0; height:260px; }
.wheel{ height:260px; overflow-y:scroll; scroll-snap-type:y mandatory; -ms-overflow-style:none; scrollbar-width:none; }
.wheel::-webkit-scrollbar{ display:none; }
.wheel-pad{ height:110px; }
.wheel-item{ height:40px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--text-tertiary); scroll-snap-align:center; font-weight:600; transition:.15s; }
.wheel-item.selected{ color:var(--text); font-size:30px; font-weight:800; }
.wheel-frame{ position:absolute; top:110px; left:0; right:0; height:40px; border-top:1.5px solid var(--divider); border-bottom:1.5px solid var(--divider); pointer-events:none; }
.wheel-unit{ text-align:center; color:var(--text-secondary); font-size:14px; margin-top:6px; }
.input-field{ width:100%; border:none; background:var(--card); border-radius:var(--radius-sm); padding:20px 18px; font-size:28px; font-weight:800; color:var(--text); text-align:center; outline:none; }
.input-field::placeholder{ color:var(--text-tertiary); font-weight:700; }
.input-hint{ text-align:center; color:var(--text-secondary); font-size:14px; margin-top:12px; }
.activity-list{ display:flex; flex-direction:column; gap:12px; margin-top:6px; }
.activity-card{ border-radius:var(--radius); background:var(--card); border:2px solid transparent; padding:16px 18px; cursor:pointer; }
.activity-card.active{ border-color:var(--accent); background:var(--accent-soft); }
.activity-top{ display:flex; align-items:center; gap:10px; font-size:16px; font-weight:700; margin-bottom:4px; }
.activity-desc{ font-size:13.5px; color:var(--text-secondary); line-height:1.35; }
.goal-list{ display:flex; flex-direction:column; gap:10px; margin-top:6px; }
.goal-card{ border-radius:var(--radius); background:var(--card); border:2px solid transparent; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.goal-card.active{ border-color:var(--accent); background:var(--accent-soft); }
.goal-left{ display:flex; align-items:center; gap:12px; }
.goal-radio{ width:20px; height:20px; border-radius:50%; border:2px solid var(--text-tertiary); flex-shrink:0; position:relative; }
.goal-card.active .goal-radio{ border-color:var(--accent); }
.goal-card.active .goal-radio::after{ content:''; position:absolute; inset:3px; border-radius:50%; background:var(--accent); }
.goal-name{ font-size:15.5px; font-weight:600; }
.goal-kcal{ font-size:14px; font-weight:700; color:var(--text-secondary); }

.btn-primary{
  width:100%; border:none; border-radius:18px; padding:18px; font-size:17px; font-weight:700;
  background:linear-gradient(115deg,var(--accent-1),var(--accent-2));
  color:var(--on-accent); cursor:pointer; box-shadow:0 10px 24px -8px rgba(255,140,20,.55);
}
.btn-primary:disabled{ opacity:.35; box-shadow:none; }
.btn-secondary{ width:100%; border:none; border-radius:18px; padding:16px; font-size:16px; font-weight:600; background:var(--card); color:var(--text); cursor:pointer; }
@keyframes shimmer{ 0%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } 100%{ background-position:0% 50%; } }

/* ---------- Экраны и переходы ---------- */
.topbar{ display:flex; align-items:center; justify-content:space-between; padding:20px 20px 6px; }
.topbar-greeting{ font-size:15px; color:var(--text-secondary); font-weight:600; }
.topbar-title{ font-size:22px; font-weight:800; color:var(--text); }
.topbar-streak{ display:flex; flex-direction:column; align-items:flex-end; gap:2px; background:var(--accent-soft); color:var(--accent-2); font-weight:700; font-size:15px; padding:8px 14px; border-radius:16px; text-align:right; }
.streak-main{ display:flex; align-items:center; gap:6px; }
.streak-main svg{ width:16px; height:16px; }
.streak-sub{ font-size:11px; font-weight:600; opacity:.7; }
.screen{ padding:6px 20px 10px; }
#mainContent.screen-enter{ animation:screenIn .5s var(--ease-out) both; }
@keyframes screenIn{ from{ opacity:0; transform:translateY(14px) scale(.988); } to{ opacity:1; transform:none; } }
.rise{ animation:riseIn .55s var(--spring) both; }
@keyframes riseIn{ from{ opacity:0; transform:translateY(16px) scale(.97); } to{ opacity:1; transform:none; } }

.ring-wrap{ display:flex; flex-direction:column; align-items:center; padding:14px 0 6px; }
.ring-label{ font-size:14px; color:var(--text-secondary); font-weight:600; margin-bottom:14px; }
.ring-svg-holder{ position:relative; width:230px; height:230px; }
.ring-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-kcal{ font-size:44px; font-weight:900; letter-spacing:-.03em; }
.ring-kcal-unit{ font-size:14px; color:var(--text-secondary); font-weight:700; margin-top:2px; }
.ring-sub{ font-size:13.5px; color:var(--text-secondary); margin-top:14px; text-align:center; max-width:280px; line-height:1.4; }
.ring-burn{ margin-top:8px; font-size:12.5px; font-weight:700; color:var(--green); }
.macros-row{ display:flex; gap:10px; margin-top:18px; }
.macro-pill{ flex:1; background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; box-shadow:var(--shadow); }
.macro-val{ font-size:16px; font-weight:800; }
.macro-lbl{ font-size:11.5px; color:var(--text-secondary); margin-top:2px; font-weight:600; }
.protein-hint{ margin-top:10px; text-align:center; font-size:13px; font-weight:700; }

.actions-grid{ display:flex; flex-direction:column; gap:12px; margin-top:20px; }
.action-btn{ display:flex; align-items:center; gap:14px; border:none; border-radius:20px; padding:17px 18px; background:var(--card); cursor:pointer; text-align:left; width:100%; box-shadow:var(--shadow); }
.action-btn.primary{
  background:linear-gradient(115deg,var(--accent-1) 0%,var(--accent-2) 36%,#ffffff 50%,var(--accent-2) 64%,var(--accent-1) 100%);
  background-size:280% 280%; animation:shimmer 16s ease-in-out infinite;
  box-shadow:0 10px 26px -8px rgba(255,140,20,.5);
}
.action-icon{ width:44px; height:44px; border-radius:14px; background:var(--chip); color:var(--chip-text); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.action-icon svg{ width:22px; height:22px; }
.action-btn.primary .action-icon{ background:rgba(255,255,255,.28); color:var(--on-accent); }
:root.accent-red .action-btn.primary .action-icon{ color:#fff; }
.action-title{ font-size:15.5px; font-weight:700; color:var(--text); }
.action-btn.primary .action-title{ color:var(--on-accent); }
.action-sub{ font-size:12.5px; color:var(--text-secondary); margin-top:1px; }
.action-btn.primary .action-sub{ color:var(--on-accent); opacity:.65; }
.action-chevron{ margin-left:auto; color:var(--text-tertiary); font-size:16px; }

.advice-card{ margin-top:20px; border-radius:var(--radius); background:var(--card); padding:18px; box-shadow:var(--shadow); }
.advice-head{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:var(--text-secondary); margin-bottom:8px; }
.advice-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulseDot 2.4s ease-in-out infinite; }
@keyframes pulseDot{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.5; transform:scale(.82);} }
.advice-text{ font-size:15px; line-height:1.45; font-weight:600; }
.warn-card{ margin-top:12px; border-radius:18px; padding:14px 16px; background:var(--accent-soft); color:var(--accent-2); font-size:13.5px; font-weight:700; line-height:1.45; display:flex; align-items:flex-start; gap:12px; }
.warn-ic{ width:24px; height:24px; border-radius:50%; border:2px solid currentColor; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; line-height:1; margin-top:1px; }
.warn-card.red{ background:rgba(255,59,48,.1); color:var(--red); }

.section-title{ font-size:20px; font-weight:800; margin:18px 0 12px; letter-spacing:-.01em; }
.card{ background:var(--card); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); position:relative; }
.card + .card{ margin-top:12px; }
.log-item{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--divider); }
.log-item:last-child{ border-bottom:none; }
.log-emoji{ width:38px; height:38px; border-radius:12px; background:var(--card-2); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.log-name{ font-size:14.5px; font-weight:600; }
.log-meta{ font-size:12px; color:var(--text-secondary); margin-top:1px; }
.log-kcal{ margin-left:auto; font-size:14.5px; font-weight:700; white-space:nowrap; }
.log-del{ border:none; background:none; color:var(--text-tertiary); font-size:15px; padding:6px; cursor:pointer; }
.empty-hint{ text-align:center; color:var(--text-secondary); font-size:13.5px; padding:20px 10px; line-height:1.5; }

/* ---------- Контроль отёков ---------- */
.metric-card{ position:relative; border-radius:22px; padding:18px; color:#fff; overflow:hidden;
  background:linear-gradient(150deg,#23242b 0%,#121317 70%); border:1px solid rgba(255,255,255,.08);
  box-shadow:var(--shadow); cursor:default; }
.metric-card::before{ content:''; position:absolute; inset:0; background:radial-gradient(420px 200px at var(--mx,80%) -20%, rgba(255,255,255,.10), transparent 60%); pointer-events:none; }
.metric-card + .metric-card{ margin-top:12px; }
.metric-lbl{ font-size:13.5px; font-weight:700; color:rgba(255,255,255,.6); }
.metric-big{ font-size:34px; font-weight:900; margin-top:6px; letter-spacing:-.02em; }
.metric-big .val{ color:#fff; } .metric-big.over .val{ color:#ff6157; }
.metric-big .limit{ color:#ff6157; font-size:24px; font-weight:800; }
.metric-big .unit2{ color:rgba(255,255,255,.5); font-size:22px; font-weight:800; }
.metric-note{ font-size:12.5px; line-height:1.5; color:rgba(255,255,255,.62); margin-top:10px; }
.metric-note b{ color:#fff; }
.info-dot{ position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:50%; border:none; background:rgba(150,150,160,.3); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2; }
.info-dot svg{ width:15px; height:15px; }
.metric-bar{ height:8px; border-radius:6px; background:rgba(255,255,255,.14); margin-top:12px; overflow:hidden; }
.metric-bar i{ display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,var(--accent-1),var(--accent-2)); transition:width .8s var(--ease-out); }
.metric-bar.watery i{ background:linear-gradient(90deg,#6fc4ff,#0a84ff); }
.metric-bar.danger i{ background:linear-gradient(90deg,#ff8a80,#ff3b30); }
.water-btns{ display:flex; gap:8px; margin-top:14px; }
.water-btn{ flex:1; border:none; border-radius:12px; padding:10px 6px; background:rgba(255,255,255,.12); color:#fff; font-size:13px; font-weight:700; cursor:pointer; }
.water-btn.minus{ flex:.7; background:rgba(255,255,255,.06); color:rgba(255,255,255,.6); }
.nk-grid{ display:flex; gap:10px; margin-top:14px; }
.nk-cell{ flex:1; background:rgba(255,255,255,.07); border-radius:14px; padding:12px; }
.nk-cell-lbl{ font-size:11px; font-weight:700; color:rgba(255,255,255,.55); }
.nk-cell-val{ font-size:17px; font-weight:800; margin-top:3px; }
.nk-ratio-badge{ display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:7px 10px; border-radius:12px; font-size:12px; font-weight:800; background:rgba(255,255,255,.1); white-space:nowrap; }
.nk-ratio-badge.good{ color:#7be08a; } .nk-ratio-badge.bad{ color:#ff8a80; }

/* ---------- Активность ---------- */
.act-hero{ display:flex; gap:14px; align-items:stretch; margin-top:8px; }
.steps-card{ flex:1.25; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
.train-card{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; cursor:pointer; }
.train-icon{ width:54px; height:54px; border-radius:18px; background:var(--chip); color:var(--chip-text); display:flex; align-items:center; justify-content:center; }
.train-icon svg{ width:26px; height:26px; }
.steps-ring-holder{ position:relative; width:148px; height:148px; margin:0 auto; }
.steps-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.steps-num{ font-size:24px; font-weight:900; letter-spacing:-.02em; }
.steps-lbl{ font-size:11px; color:var(--text-secondary); font-weight:700; }
.act-quote{ margin-top:16px; border-radius:18px; padding:16px; background:var(--accent-soft); color:var(--accent-2); font-size:13.5px; font-weight:700; line-height:1.5; text-align:center; }
.workout-item{ display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--divider); }
.workout-item:last-child{ border-bottom:none; }
.workout-kcal{ margin-left:auto; text-align:right; }
.workout-kcal-lbl{ font-size:10.5px; color:var(--text-secondary); font-weight:700; }
.workout-kcal-val{ font-size:16px; font-weight:900; }
.empty-mid{ text-align:center; font-size:16px; font-weight:700; color:var(--text-secondary); padding:34px 10px 26px; }
.step-block{ overflow:hidden; max-height:0; opacity:0; transition:max-height .5s var(--ease-out), opacity .4s ease, margin .4s ease; margin-top:0; }
.step-block.revealed{ max-height:400px; opacity:1; margin-top:14px; }
input[type=range].hard-slider{ -webkit-appearance:none; width:100%; height:8px; border-radius:6px; background:linear-gradient(90deg,var(--green),var(--accent-2),var(--red)); outline:none; margin:14px 0 4px; }
input[type=range].hard-slider::-webkit-slider-thumb{ -webkit-appearance:none; width:28px; height:28px; border-radius:50%; background:#fff; border:1px solid rgba(0,0,0,.08); box-shadow:0 2px 8px rgba(0,0,0,.25); cursor:pointer; }
.slider-caption{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-secondary); font-weight:600; }

/* ---------- Аналитика ---------- */
.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
.fat-card{ margin-top:12px; background:var(--card); border-radius:18px; padding:14px 18px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.fat-card .mini-btn svg{ width:18px; height:18px; }
.fat-btn{ width:100%; margin-top:12px; border:none; background:var(--card); border-radius:18px; padding:17px; font-size:15px; font-weight:700; color:var(--text); box-shadow:var(--shadow); cursor:pointer; }
.stat-card{ background:var(--card); border-radius:18px; padding:16px; box-shadow:var(--shadow); }
.stat-val{ font-size:22px; font-weight:800; letter-spacing:-.01em; }
.stat-lbl{ font-size:12px; color:var(--text-secondary); margin-top:3px; font-weight:600; }
.forecast-card{ margin-top:14px; text-align:center; padding:20px 18px; }
.forecast-num{ font-size:28px; font-weight:900; letter-spacing:-.02em; }
.forecast-lbl{ font-size:13px; color:var(--text-secondary); font-weight:600; margin-top:4px; line-height:1.4; }
.calendar-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px; }
.cal-cell{ aspect-ratio:1/1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; background:var(--card-2); color:var(--text-tertiary); }
.cal-cell.ok{ background:rgba(52,199,89,.18); color:var(--green); }
.cal-cell.warn{ background:rgba(255,156,26,.18); color:var(--accent-2); }
.cal-cell.bad{ background:rgba(255,59,48,.16); color:var(--red); }
.cal-cell.frozen{ background:rgba(10,132,255,.15); color:var(--blue); }
.cal-cell.today{ outline:2px solid var(--accent); }
.cal-legend{ display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; font-size:11px; color:var(--text-secondary); font-weight:600; }
.cal-legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:4px; vertical-align:-1px; }
.weight-hero{ text-align:center; padding:14px 0 4px; }
.weight-hero-lbl{ font-size:14px; color:var(--text-secondary); font-weight:600; }
.weight-hero-val{ font-size:42px; font-weight:900; margin-top:4px; letter-spacing:-.02em; }
.weight-trend{ margin-top:12px; background:var(--accent-soft); color:var(--accent-2); font-weight:700; font-size:13.5px; padding:12px 16px; border-radius:16px; text-align:center; line-height:1.4; }
.chart-holder{ margin-top:14px; }
.log-weight-btn{ width:100%; border:none; border-radius:18px; padding:16px; font-size:15.5px; font-weight:700; background:var(--card); color:var(--text); margin-top:14px; cursor:pointer; box-shadow:var(--shadow); }

/* ---------- Нижняя навигация ---------- */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  background:var(--bg-elevated); border-top:1px solid var(--divider);
  display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom)); z-index:40;
}
.nav-item{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; border:none; background:none; padding:7px 0; cursor:pointer; color:var(--text-tertiary); }
.nav-item svg{ width:23px; height:23px; transition:transform .45s var(--spring); }
.nav-item.active{ color:var(--accent-2); }
.nav-item.active svg{ transform:translateY(-2px) scale(1.12); }
.nav-label{ font-size:10px; font-weight:700; }

/* ---------- Liquid Glass (прогрессивно) ---------- */
html.lg .card, html.lg .stat-card, html.lg .macro-pill, html.lg .action-btn:not(.primary), html.lg .advice-card, html.lg .log-weight-btn, html.lg .btn-secondary{
  background:var(--glass-bg); backdrop-filter:blur(22px) saturate(160%); -webkit-backdrop-filter:blur(22px) saturate(160%);
  border:1px solid var(--glass-border); box-shadow:inset 0 1px 0 var(--glass-inner), var(--shadow);
}
html.lg .bottom-nav{ background:var(--glass-bg); backdrop-filter:blur(28px) saturate(180%); -webkit-backdrop-filter:blur(28px) saturate(180%); border-top:1px solid var(--glass-border); }
html.lg .sheet{ background:var(--glass-bg); backdrop-filter:blur(34px) saturate(180%); -webkit-backdrop-filter:blur(34px) saturate(180%); border:1px solid var(--glass-border); border-bottom:none; }
html.lg .card::after, html.lg .action-btn:not(.primary)::after{
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:radial-gradient(300px 140px at var(--mx,75%) var(--my,-30%), rgba(255,255,255,.16), transparent 65%);
}
html.lg .action-btn, html.lg .card{ position:relative; overflow:hidden; }
html.lg body{ background:
  radial-gradient(900px 500px at 110% -10%, rgba(255,156,26,.10), transparent 60%),
  radial-gradient(700px 460px at -20% 110%, rgba(10,132,255,.08), transparent 60%), var(--bg); background-attachment:fixed; }
html.lg.accent-red body{ background:
  radial-gradient(900px 500px at 110% -10%, rgba(242,55,42,.10), transparent 60%),
  radial-gradient(700px 460px at -20% 110%, rgba(180,190,205,.10), transparent 60%), var(--bg); background-attachment:fixed; }

/* ---------- Sheet ---------- */
.sheet-overlay{ position:fixed; inset:0; background:rgba(8,8,12,.5); z-index:100; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .3s ease; }
html.lg .sheet-overlay{ backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.sheet-overlay.open{ opacity:1; pointer-events:auto; }
.sheet{ background:var(--bg); width:100%; max-width:480px; margin:0 auto; border-radius:26px 26px 0 0; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:transform .5s var(--spring); padding:14px 20px calc(30px + env(safe-area-inset-bottom)); position:relative; }
.sheet-overlay.open .sheet{ transform:translateY(0); }
.sheet-handle{ width:38px; height:5px; background:var(--divider); border-radius:6px; margin:0 auto 14px; }
.sheet-title{ font-size:19px; font-weight:800; margin-bottom:14px; padding-right:36px; }
.sheet-close{ position:absolute; top:14px; right:16px; width:32px; height:32px; border-radius:50%; background:var(--card); border:none; color:var(--text-secondary); font-size:15px; cursor:pointer; z-index:5; }
.modal-overlay{ position:fixed; inset:0; background:rgba(8,8,12,.55); z-index:120; display:flex; align-items:center; justify-content:center; padding:28px; opacity:0; pointer-events:none; transition:opacity .25s ease; }
.modal-overlay.open{ opacity:1; pointer-events:auto; }
.modal{ background:var(--card); border-radius:22px; padding:22px; max-width:340px; width:100%; transform:scale(.9); transition:transform .45s var(--spring); box-shadow:var(--shadow-lg); }
html.lg .modal{ background:var(--glass-bg); backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%); border:1px solid var(--glass-border); }
.modal-overlay.open .modal{ transform:scale(1); }
.modal-title{ font-size:16.5px; font-weight:800; margin-bottom:10px; }
.modal-text{ font-size:14px; line-height:1.55; color:var(--text); }
.modal-text + .modal-text{ margin-top:10px; }

/* ---------- Еда ---------- */
.search-input{ width:100%; border:none; background:var(--card); border-radius:14px; padding:14px 16px; font-size:15px; color:var(--text); outline:none; margin-bottom:14px; box-shadow:var(--shadow); }
.food-tabs{ display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; scrollbar-width:none; }
.food-tabs::-webkit-scrollbar{ display:none; }
.food-tab{ border:none; background:var(--card); padding:9px 15px; border-radius:14px; font-size:13.5px; font-weight:700; color:var(--text-secondary); white-space:nowrap; cursor:pointer; }
.food-tab.active{ background:var(--accent); color:var(--on-accent); }
.food-result{ display:flex; align-items:center; gap:12px; padding:12px 6px; border-radius:14px; cursor:pointer; }
.food-result:active{ background:var(--card); }
.food-r-emoji{ width:40px; height:40px; border-radius:12px; background:var(--card-2); display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
.food-r-name{ font-size:14.5px; font-weight:700; }
.food-r-meta{ font-size:12px; color:var(--text-secondary); margin-top:1px; }
.food-r-kcal{ margin-left:auto; font-size:13.5px; font-weight:700; color:var(--text-secondary); white-space:nowrap; }
.field-label{ font-size:13px; font-weight:700; color:var(--text-secondary); margin:14px 0 6px; }
.plain-input{ width:100%; border:none; background:var(--card); border-radius:14px; padding:14px 16px; font-size:15.5px; color:var(--text); outline:none; box-shadow:var(--shadow); }
textarea.plain-input{ min-height:120px; resize:vertical; line-height:1.5; }
.pill-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.pill{ border:2px solid transparent; background:var(--card); padding:9px 14px; border-radius:12px; font-size:13.5px; font-weight:700; cursor:pointer; color:var(--text); }
.pill.active{ border-color:var(--accent); background:var(--accent-soft); color:var(--accent-2); }
.gram-pills{ display:flex; gap:8px; margin-top:10px; }
.result-source{ font-size:11px; color:var(--text-tertiary); text-align:center; margin:2px 0 10px; }
.spinner{ width:20px; height:20px; border-radius:50%; border:2.5px solid var(--divider); border-top-color:var(--accent-2); animation:spin .7s linear infinite; margin:16px auto; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* сканер */
.scan-box{ aspect-ratio:1/1; border-radius:24px; background:#0c0c0e; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; margin-bottom:14px; }
.scan-box video,.scan-box canvas{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.scan-frame{ width:70%; height:45%; border:3px solid var(--accent); border-radius:18px; box-shadow:0 0 0 999px rgba(0,0,0,.4); position:relative; z-index:2; }
.scan-line{ position:absolute; left:6%; right:6%; height:2px; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:scanmove 1.6s ease-in-out infinite; }
@keyframes scanmove{ 0%{ top:8%; } 50%{ top:88%; } 100%{ top:8%; } }
.scan-status{ color:#fff; font-size:12.5px; text-align:center; position:absolute; bottom:10px; left:10px; right:10px; z-index:3; opacity:.85; }
.manual-barcode-row{ display:flex; gap:8px; margin-top:14px; }
.manual-barcode-row .plain-input{ flex:1; }
.manual-barcode-row button{ border:none; background:var(--accent); color:var(--on-accent); font-weight:700; padding:0 18px; border-radius:14px; cursor:pointer; }

/* ---------- Настройки ---------- */
.settings-tabs{ display:flex; gap:8px; margin:4px 0 18px; }
.settings-tab{ flex:1; border:none; background:var(--card); padding:11px 4px; border-radius:14px; font-size:13px; font-weight:700; color:var(--text-secondary); cursor:pointer; }
.settings-tab.active{ background:var(--accent); color:var(--on-accent); }
.field-row{ display:flex; align-items:center; justify-content:space-between; padding:14px 4px; border-bottom:1px solid var(--divider); gap:10px; flex-wrap:wrap; }
.field-row:last-child{ border-bottom:none; }
.field-row-label{ font-size:14.5px; color:var(--text-secondary); font-weight:600; }
.field-row-input{ border:none; background:none; text-align:right; font-size:14.5px; font-weight:700; color:var(--text); width:120px; outline:none; }
.theme-toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 4px 18px; }
.switch{ width:50px; height:30px; border-radius:20px; background:var(--card-2); position:relative; cursor:pointer; flex-shrink:0; transition:background .3s ease; }
.switch.on{ background:var(--accent); }
.switch .knob{ position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:transform .4s var(--spring); box-shadow:0 1px 3px rgba(0,0,0,.3); }
.switch.on .knob{ transform:translateX(20px); }
.accent-dots{ display:flex; gap:14px; margin-top:8px; }
.accent-choice{ text-align:center; cursor:pointer; }
.accent-dot{ width:44px; height:44px; border-radius:50%; border:3px solid transparent; margin:0 auto; }
.accent-choice.active .accent-dot{ border-color:var(--text); }
.accent-dot.a-orange{ background:#ff9c1a; }
.accent-dot.a-red{ background:#f2372a; }
.accent-dot.a-mono{ background:#2a2c31; }
.accent-name{ font-size:11px; font-weight:700; color:var(--text-secondary); margin-top:6px; }
.goal-banner{ background:var(--accent-soft); border-radius:18px; padding:16px; text-align:center; margin-bottom:16px; }
.goal-banner-lbl{ font-size:12.5px; color:var(--accent-2); font-weight:700; }
.goal-banner-val{ font-size:24px; font-weight:900; margin-top:4px; }
.data-btn{ display:flex; align-items:center; gap:12px; width:100%; border:none; border-radius:16px; padding:15px 16px; background:var(--card); color:var(--text); font-size:14.5px; font-weight:700; cursor:pointer; text-align:left; box-shadow:var(--shadow); }
.data-btn + .data-btn{ margin-top:10px; }
.data-btn .action-icon{ width:38px; height:38px; border-radius:12px; }
.data-btn .action-icon svg{ width:19px; height:19px; }
.data-btn.danger{ color:var(--red); }

/* импорт */
.import-row{ display:grid; grid-template-columns:1.35fr 1fr 1fr; gap:8px; margin-top:8px; }
.import-row input{ border:none; background:var(--card); border-radius:10px; padding:10px; font-size:13px; color:var(--text); outline:none; min-width:0; }
.import-row2{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:6px; margin-bottom:10px; }
.import-row2 input{ border:none; background:var(--card-2); border-radius:10px; padding:9px; font-size:12.5px; color:var(--text); outline:none; min-width:0; }
.import-day{ border-bottom:1px dashed var(--divider); padding-bottom:4px; margin-bottom:4px; }

/* ---------- Цель достигнута ---------- */
#goalOverlay{ position:fixed; inset:0; background:rgba(5,5,10,.85); z-index:500; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:30px; }
.goal-emoji{ font-size:74px; animation:goalPop .8s var(--spring) both; }
.goal-big{ font-size:30px; font-weight:900; color:#fff; margin-top:18px; animation:riseIn .7s .2s var(--spring) both; }
.goal-sub{ font-size:15px; color:rgba(255,255,255,.7); margin-top:10px; line-height:1.5; animation:riseIn .7s .35s var(--spring) both; }
@keyframes goalPop{ 0%{ transform:scale(0) rotate(-20deg); } 100%{ transform:scale(1) rotate(0); } }
.confetti{ position:absolute; top:-20px; width:10px; height:14px; border-radius:3px; animation:confFall linear forwards; }
@keyframes confFall{ to{ transform:translateY(110vh) rotate(720deg); opacity:.6; } }

.toast{ position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:12px 20px; border-radius:14px; font-size:13.5px; font-weight:700; z-index:600; opacity:0; transition:opacity .25s ease, bottom .3s var(--spring); pointer-events:none; max-width:88%; text-align:center; }
.toast.show{ opacity:1; bottom:112px; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
}
/* --- дополнительные элементы --- */
.clickable{ cursor:pointer; }
.mini-btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 13px; border-radius:12px; border:none; background:var(--chip); color:var(--chip-text); font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:transform .3s var(--spring), opacity .2s; }
.mini-btn:active{ transform:scale(.93); opacity:.85; }
.mini-btn svg{ width:14px; height:14px; }
.steps-btns{ display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.steps-goal{ font-size:12px; color:var(--text-secondary); text-align:center; margin-top:8px; font-weight:600; }
.train-name{ font-size:15px; font-weight:800; }
.train-sub{ font-size:12px; color:var(--text-secondary); }
.workout-icon{ width:44px; height:44px; border-radius:14px; background:var(--chip); color:var(--chip-text); display:flex; align-items:center; justify-content:center; flex:none; }
.workout-icon svg{ width:20px; height:20px; }
.workout-info{ flex:1; min-width:0; }
.workout-name{ font-size:14.5px; font-weight:700; }
.workout-detail{ font-size:12px; color:var(--text-secondary); margin-top:2px; }
.limit2{ color:rgba(255,255,255,.55); font-size:24px; font-weight:800; }
.import-day-title{ font-size:12.5px; font-weight:700; color:var(--text-secondary); margin:12px 2px 6px; }
.data-btn{ display:grid; grid-template-columns:38px 1fr; column-gap:12px; align-items:center; }
.data-btn-ic{ grid-row:1 / span 2; width:38px; height:38px; border-radius:12px; background:var(--chip); color:var(--chip-text); display:flex; align-items:center; justify-content:center; }
.data-btn-ic svg{ width:17px; height:17px; }
.data-btn-sub{ grid-column:2; font-size:12px; font-weight:500; color:var(--text-secondary); margin-top:2px; }
.settings-hint{ font-size:12.5px; color:var(--text-secondary); margin:12px 4px 0; line-height:1.5; }
.goal-banner-num{ font-size:38px; font-weight:900; letter-spacing:-.02em; line-height:1.1; }
.field-row-lbl{ font-size:14.5px; color:var(--text-secondary); font-weight:600; flex:none; }
.weight-hero{ display:flex; align-items:center; justify-content:space-between; gap:12px; text-align:left; padding:2px 2px 10px; }
.weight-hero-num{ font-size:30px; font-weight:900; letter-spacing:-.02em; }
.cal-dot{ display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px; background:var(--divider); }
.cal-dot.ok{ background:var(--green); } .cal-dot.warn{ background:#ffc247; } .cal-dot.bad{ background:var(--red); } .cal-dot.frozen{ background:#69b7ff; }
</style>
</head>

<script>
(function(){
"use strict";

/* ================= Telegram + среда ================= */
const tg = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnavailable !== true) ? window.Telegram.WebApp : null;
let cloudOK = false;
if(tg){
  try{
    tg.ready(); tg.expand();
    if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    if(tg.setHeaderColor) tg.setHeaderColor('#000000');
    cloudOK = !!(tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9'));
  }catch(e){}
}
function haptic(kind){
  try{
    if(!tg || !tg.HapticFeedback) return;
    if(kind==='ok') tg.HapticFeedback.notificationOccurred('success');
    else if(kind==='warn') tg.HapticFeedback.notificationOccurred('warning');
    else tg.HapticFeedback.impactOccurred(kind||'light');
  }catch(e){}
}

/* Liquid Glass: включаем только если браузер умеет современный CSS.
   На старых устройствах остаётся классический стиль без ошибок. */
const LG_OK = (window.CSS && CSS.supports && (CSS.supports('backdrop-filter','blur(2px)') || CSS.supports('-webkit-backdrop-filter','blur(2px)')) && CSS.supports('color','color-mix(in srgb, red 50%, blue)'));
if(LG_OK) document.documentElement.classList.add('lg');
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(new URLSearchParams(location.search).get('noanim')==='1'){ // служебное: мгновенные анимации для предпросмотра
  const st = document.createElement('style');
  st.textContent = '*{transition-duration:0s!important;animation-duration:0s!important;animation-delay:0s!important}';
  document.head.appendChild(st);
}

/* динамическое освещение карточек */
if(LG_OK && !REDUCED){
  let raf = null;
  document.addEventListener('pointermove', (e)=>{
    if(raf) return;
    raf = requestAnimationFrame(()=>{
      raf = null;
      const el = e.target && e.target.closest ? e.target.closest('.card, .action-btn, .metric-card, .stat-card') : null;
      if(!el) return;
      const r = el.getBoundingClientRect();
      el.style.setProperty('--mx', Math.round((e.clientX-r.left)/r.width*100)+'%');
      el.style.setProperty('--my', Math.round((e.clientY-r.top)/r.height*100)+'%');
    });
  }, {passive:true});
}

/* ================= Хранение =================
   Правильная схема для публичного хостинга (GitHub Pages):
   — внутри Telegram: CloudStorage — данные привязаны к конкретному
     пользователю бота и синхронизируются между его устройствами.
     Каждый пользователь видит только свои данные.
   — вне Telegram (браузер): localStorage как запасной вариант.
   Значения CloudStorage ограничены 4096 символами — режем на части. */
const CS_CHUNK = 3500, CS_MAX = 60;
function csGetItems(keys){ return new Promise(res=>{ try{ tg.CloudStorage.getItems(keys,(e,v)=>res(e?null:v)); }catch(_){ res(null); } }); }
function csSetItem(k,v){ return new Promise(res=>{ try{ tg.CloudStorage.setItem(k,v,(e,ok)=>res(!e&&ok!==false)); }catch(_){ res(false); } }); }
function csRemoveItems(keys){ return new Promise(res=>{ try{ tg.CloudStorage.removeItems(keys,()=>res(true)); }catch(_){ res(false); } }); }

async function storageLoad(){
  if(cloudOK){
    try{
      const meta = await csGetItems(['cs_meta']);
      const n = meta && meta.cs_meta ? (parseInt(meta.cs_meta)||0) : 0;
      if(n>0 && n<=CS_MAX){
        const keys = Array.from({length:n},(_,i)=>'cs_'+i);
        const parts = await csGetItems(keys);
        if(parts){
          const json = keys.map(k=>parts[k]||'').join('');
          if(json) return JSON.parse(json);
        }
      }
    }catch(e){}
  }
  try{ const raw = localStorage.getItem('charge_v2'); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
let _saveTimer = null, _savedChunks = 0;
function save(now){ clearTimeout(_saveTimer); _saveTimer = setTimeout(doSave, now?0:400); }
async function doSave(){
  let json = '';
  try{ json = JSON.stringify(S); }catch(e){ return; }
  try{ localStorage.setItem('charge_v2', json); }catch(e){}
  if(!cloudOK) return;
  try{
    const n = Math.min(CS_MAX, Math.ceil(json.length/CS_CHUNK));
    for(let i=0;i<n;i++) await csSetItem('cs_'+i, json.slice(i*CS_CHUNK,(i+1)*CS_CHUNK));
    await csSetItem('cs_meta', String(n));
    if(_savedChunks>n){
      const extra = []; for(let i=n;i<_savedChunks;i++) extra.push('cs_'+i);
      await csRemoveItems(extra);
    }
    _savedChunks = n;
  }catch(e){}
}
window.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') doSave(); });

/* ---- Open Food Facts (открытая база, без ключа; при офлайне — локальная база) ---- */
function offToFood(prod){
  const n = prod.nutriments || {};
  const kcal = n['energy-kcal_100g'] ?? n['energy-kcal'] ?? null;
  if(kcal==null || kcal<=0) return null;
  const name = (prod.product_name_ru || prod.product_name || '').trim();
  if(!name) return null;
  const brand = prod.brands ? prod.brands.split(',')[0].trim() : '';
  let na = null;
  if(n.sodium_100g!=null) na = n.sodium_100g*1000;
  else if(n.salt_100g!=null) na = n.salt_100g*400;
  const k = n.potassium_100g!=null ? n.potassium_100g*1000 : null;
  return { name: brand? `${name} — ${brand}` : name, emoji:'🍽',
    per100:{ kcal:Math.round(kcal), p:r1(n.proteins_100g||0), c:r1(n.carbohydrates_100g||0), f:r1(n.fat_100g||0),
      na: na!=null? Math.round(na): null, k: k!=null? Math.round(k): null } };
}
async function searchOpenFoodFacts(query){
  const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(query)+'&search_simple=1&action=process&json=1&page_size=20&fields=product_name,product_name_ru,brands,nutriments';
  const res = await fetch(url); if(!res.ok) throw new Error('network');
  const data = await res.json();
  return (data.products||[]).map(offToFood).filter(Boolean);
}
async function lookupBarcodeOFF(code){
  const url = 'https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,product_name_ru,brands,nutriments,status';
  const res = await fetch(url); if(!res.ok) throw new Error('network');
  const data = await res.json();
  if(data.status!==1 || !data.product) return null;
  return offToFood(data.product);
}

/* ================= Калории и расчёты ================= */
function bmr(p){ const base = 10*p.weight + 6.25*p.height - 5*p.age; return p.gender==='male' ? base+5 : base-161; }
const ACTIVITY_MULT = { low:1.2, medium:1.375, high:1.55 };
function tdee(p){ return bmr(p) * ACTIVITY_MULT[p.activity]; }
const GOAL_DEFICIT = { maintain:0, slow:200, moderate:500, fast:700 };
const GOAL_RATE_KG_WEEK = { maintain:0, slow:0.2, moderate:0.5, fast:0.75 };
function goalCalories(p){ const t = tdee(p) - GOAL_DEFICIT[p.goal] + (p.calorieAdjust||0); return Math.round(t/10)*10; }

function dayItems(ds){ return S.foodLog[ds] || []; }
function dayTotal(ds){ return Math.round(dayItems(ds).reduce((s,i)=>s+(i.kcal||0),0)); }
function dayMacro(ds,key){ return Math.round(dayItems(ds).reduce((s,i)=>s+(i[key]||0),0)); }
function dayNa(ds){ return Math.round(dayItems(ds).reduce((s,i)=>s+(i.na!=null?i.na:(i.kcal||0)*0.9),0)); }
function dayK(ds){ return Math.round(dayItems(ds).reduce((s,i)=>s+(i.k!=null?i.k:(i.kcal||0)*1.2),0)); }
function daySalt(ds){ return r1(dayNa(ds)*2.5/1000); }
const SALT_LIMIT = 4.5;
function dayWater(ds){ return S.waterLog[ds] || 0; }
function waterNormMl(){ if(!S.profile) return 2000; const per = S.profile.gender==='female' ? 33 : 40; return Math.round(S.profile.weight*per/50)*50; }
function workoutsKcal(ds){ return Math.round((S.workoutLog[ds]||[]).reduce((s,w)=>s+(w.kcal||0),0)); }
function stepsKcal(ds){ const w = S.profile ? S.profile.weight : 70; return Math.round(daySteps(ds) * w * 0.00038); } // ~0.38 ккал на 1000 шагов на кг веса
function dayBurned(ds){ return workoutsKcal(ds) + stepsKcal(ds); }
function daySteps(ds){ return S.stepsLog[ds] || 0; }
const STEPS_GOAL = 10000;
function activityRating(ds){
  const score = daySteps(ds)/STEPS_GOAL + workoutsKcal(ds)/350;
  if(score>=0.9) return {label:'Отличная', color:'#7be08a'};
  if(score>=0.45) return {label:'Умеренная', color:'#ffc247'};
  return {label:'Слабая', color:'#ff8a80'};
}
function dayDeficit(ds){ /* отрицательное = дефицит */ return dayTotal(ds) - goalCalories(S.profile) - dayBurned(ds); }

/* ---- стрик с заморозками (3 в месяц) ---- */
function streakInfo(){
  const frozen = new Set();
  const budget = {};
  const today = todayStr();
  const hasToday = dayItems(today).length>0;
  let count = hasToday ? 1 : 0;
  let pending = [];
  const d = new Date(); d.setDate(d.getDate()-1);
  for(let i=0;i<800;i++){
    const ds = todayStr(d);
    if(dayItems(ds).length>0){
      pending.forEach(x=>frozen.add(x)); pending = [];
      count++;
    } else {
      const m = ds.slice(0,7);
      budget[m] = (budget[m]||0)+1;
      if(budget[m]>3) break;
      pending.push(ds);
    }
    d.setDate(d.getDate()-1);
  }
  const display = hasToday ? count : (count>0 ? count+1 : 0);
  return { count, display, hasToday, frozen };
}

/* ================= Splash ================= */
function runSplash(done){
  const sp = document.getElementById('splash');
  const params = new URLSearchParams(location.search);
  if(!sp){ done(); return; }
  if(params.get('nosplash')==='1' || REDUCED){ sp.remove(); done(); return; }
  const v = document.getElementById('splashVid');
  let finished = false;
  const finish = ()=>{ if(finished) return; finished = true; sp.classList.add('out'); setTimeout(()=>sp.remove(), 500); done(); };
  v.addEventListener('ended', finish);
  v.addEventListener('error', finish);
  setTimeout(()=>{ if(!finished) haptic('medium'); }, 1200);   // молния разгорается
  const p = v.play();
  if(p && p.catch) p.catch(finish);                            // автоплей заблокирован — сразу открываем приложение
  setTimeout(finish, 5600);                                    // страховка на случай зависшего видео
}

      {k:'medium', t:'Умеренный', d:'Есть прогулки и 5 000–10 000 шагов, 1–3 тренировки в неделю'},
      {k:'high', t:'Высокий', d:'Активная работа или спорт, более 10 000 шагов, 4+ тренировки в неделю'},
    ];
    body = `
      <div class="ob-title">Твой уровень активности?</div>
      <div class="ob-sub">Выбери, что больше всего похоже на твою обычную неделю</div>
      <div class="ob-body"><div class="activity-list">
        ${opts.map(o=>`<div class="activity-card pressable ${obDraft.activity===o.k?'active':''}" data-a="${o.k}"><div class="activity-top">${o.t}</div><div class="activity-desc">${o.d}</div></div>`).join('')}
      </div></div>`;
    canNext = !!obDraft.activity;
  }
  else if(step===5){
    const draftP = {gender:obDraft.gender||'male', age:obDraft.age, height:obDraft.height||170, weight:obDraft.weight||70, activity:obDraft.activity||'medium'};
    const t = Math.round(tdee(draftP)/10)*10;
    const goals = [
      {k:'maintain', t:'Поддерживать вес', kcal:t},
      {k:'slow', t:'Медленно худеть', kcal:t-200},
      {k:'moderate', t:'Худеть умеренно ★', kcal:t-500},
      {k:'fast', t:'Худеть быстро', kcal:t-700},
    ];
    body = `
      <div class="ob-title">Какая твоя цель?</div>
      <div class="ob-sub">Приложение само посчитает нужную калорийность</div>
      <div class="ob-body"><div class="goal-list">
        ${goals.map(g=>`<div class="goal-card pressable ${obDraft.goal===g.k?'active':''}" data-goal="${g.k}"><div class="goal-left"><div class="goal-radio"></div><div class="goal-name">${g.t}</div></div><div class="goal-kcal">${Math.round(g.kcal)}</div></div>`).join('')}
      </div></div>`;
    canNext = !!obDraft.goal;
  }
  else if(step===6){
    body = `
      <div class="ob-title">И, наконец, как тебя зовут?</div>
      <div class="ob-sub">Так к тебе будет обращаться приложение</div>
      <div class="ob-body"><input class="input-field" id="nameInput" type="text" placeholder="Имя" value="${escapeHtml(obDraft.name||'')}" style="font-size:22px;"></div>`;
    canNext = (obDraft.name||'').trim().length>0;
  }

  app.innerHTML = `
    <div class="ob-screen">
      <div class="ob-dots">${dots}</div>
      ${step>0?'<button class="ob-back" id="obBack">‹</button>':''}
      ${body}
      <div class="ob-footer"><button class="btn-primary" id="obNext" ${canNext?'':'disabled'}>${step===6?'Начать':'Продолжить'}</button></div>
    </div>`;

  const backBtn = document.getElementById('obBack');
  if(backBtn) backBtn.onclick = ()=>renderOnboarding(step-1);

  if(step===0) app.querySelectorAll('.gender-card').forEach(el=>{ el.onclick = ()=>{ obDraft.gender = el.dataset.g; renderOnboarding(0); }; });
  if(step===1){
    const wheel = document.getElementById('ageWheel');
    const items = wheel.querySelectorAll('.wheel-item');
    const itemH = 40;
    function updateSelection(){
      const idx = Math.round(wheel.scrollTop / itemH);
      items.forEach((it,i)=> it.classList.toggle('selected', i===idx));
      obDraft.age = Math.max(10, Math.min(100, idx));
    }
    wheel.addEventListener('scroll', ()=>{
      clearTimeout(wheel._t);
      updateSelection();
      wheel._t = setTimeout(()=>{ const idx = Math.round(wheel.scrollTop / itemH); wheel.scrollTo({top: idx*itemH, behavior:'smooth'}); }, 120);
    });
    requestAnimationFrame(()=>{ wheel.scrollTop = (obDraft.age||25) * itemH; updateSelection(); });
  }
  if(step===2){ const inp = document.getElementById('heightInput'); inp.oninput = ()=>{ obDraft.height = parseInt(inp.value)||null; document.getElementById('obNext').disabled = !(obDraft.height>=100 && obDraft.height<=250); }; }
  if(step===3){ const inp = document.getElementById('weightInput'); inp.oninput = ()=>{ obDraft.weight = parseFloat(inp.value)||null; document.getElementById('obNext').disabled = !(obDraft.weight>=30 && obDraft.weight<=300); }; }
  if(step===4) app.querySelectorAll('.activity-card').forEach(el=>{ el.onclick = ()=>{ obDraft.activity = el.dataset.a; renderOnboarding(4); }; });
  if(step===5) app.querySelectorAll('.goal-card').forEach(el=>{ el.onclick = ()=>{ obDraft.goal = el.dataset.goal; renderOnboarding(5); }; });
  if(step===6){ const inp = document.getElementById('nameInput'); inp.oninput = ()=>{ obDraft.name = inp.value; document.getElementById('obNext').disabled = !(inp.value.trim().length>0); }; }

  document.getElementById('obNext').onclick = ()=>{
    if(step<6){ haptic('light'); renderOnboarding(step+1); return; }
    S.profile = {
      gender:obDraft.gender, age:obDraft.age, height:obDraft.height, weight:obDraft.weight,
      activity:obDraft.activity, goal:obDraft.goal, name:obDraft.name.trim(),
      targetWeight: r1(obDraft.weight - (obDraft.gender==='female'?1.5:2.5)),
      calorieAdjust:0
    };
    S.weightLog = [{date:todayStr(), weight:S.profile.weight}];
    save(true);
    haptic('ok');
    renderMain();
  };
}

/* умные советы на основе последних дней */
function lastDays(n){
  const arr = [];
  const d = new Date();
  for(let i=0;i<n;i++){ arr.push(todayStr(d)); d.setDate(d.getDate()-1); }
  return arr;
}
function getSmartAdvice(){
  const p = S.profile;
  const ds = todayStr();
  const goal = goalCalories(p);
  const targetProtein = Math.round(p.weight*1.8);
  const days3 = lastDays(4).slice(1).filter(x=>dayItems(x).length>0);
  if(dayItems(ds).length===0 && days3.length===0)
    return `Начни с первого приёма пищи. Цель на день — ${goal} ккал и около ${targetProtein} г белка, чтобы сохранить мышцы на сушке`;
  if(daySalt(ds) > SALT_LIMIT)
    return `Сегодня уже ${daySalt(ds)} г соли — выше границы ${SALT_LIMIT} г. Вечером выбирай пресную еду и пей воду по жажде, иначе завтра будет задержка воды и отёк`;
  if(days3.length>=2){
    const avgP = Math.round(days3.reduce((s,x)=>s+dayMacro(x,'p'),0)/days3.length);
    if(avgP < targetProtein*0.7)
      return `За последние дни белка в среднем ${avgP} г при цели ${targetProtein} г. Добавляй творог, курицу или протеиновый коктейль в каждый приём пищи`;
    const avgDef = Math.round(days3.reduce((s,x)=>s+dayDeficit(x),0)/days3.length);
    if(avgDef < -1000)
      return `Средний дефицит за последние дни около ${Math.abs(avgDef)} ккал — это слишком много. Так теряются мышцы и замедляется обмен. Подними калорийность ближе к цели`;
    if(avgDef > 250)
      return `Последние дни в среднем +${avgDef} ккал к норме. Попробуй убрать перекусы после ужина — обычно именно они ломают дефицит`;
  }
  const water = dayWater(ds), norm = waterNormMl();
  if(new Date().getHours()>=16 && water < norm*0.4)
    return `К вечеру выпито только ${(water/1000).toFixed(1)} л из ${(norm/1000).toFixed(1)} л. Равномерно добери норму, но не заливай всё перед сном`;
  const steps3 = lastDays(3).reduce((s,x)=>s+daySteps(x),0)/3;
  if(steps3 < 4000)
    return `Шагов в последние дни маловато. Прогулка 30–40 минут в день заметно ускорит сушку и уберёт отёчность`;
  const si = streakInfo();
  return `Ты на верном пути${si.display>1?` — уже ${si.display}-й день подряд`:''}. Держи белок около ${targetProtein} г, соль до ${SALT_LIMIT} г и не пропускай шаги`;
}

/* ================= Экран достижения цели ================= */
function checkGoalReached(){
  const p = S.profile;
  if(!p || !p.targetWeight || !S.weightLog.length) return;
  const sorted = [...S.weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const last = sorted[sorted.length-1].weight;
  if(last > p.targetWeight + 1){ if(S.goalShown){ S.goalShown = false; save(); } return; }
  if(last <= p.targetWeight && !S.goalShown){
    S.goalShown = true; save(true);
    showGoalOverlay(last);
  }
}
function showGoalOverlay(w){
  const colors = ['#ffc247','#ff8a1e','#34c759','#0a84ff','#ff2d78','#c9d2dd'];

    conf += `<div class="confetti" style="left:${Math.random()*100}%;background:${colors[i%6]};animation-duration:${(2+Math.random()*2.4).toFixed(2)}s;animation-delay:${(Math.random()*0.9).toFixed(2)}s;transform:rotate(${Math.round(Math.random()*360)}deg)"></div>`;
  }
  const ov = document.createElement('div');
  ov.id = 'goalOverlay';
  ov.innerHTML = `${conf}
    <div class="goal-emoji">🏆</div>
    <div class="goal-big">Цель достигнута!</div>
    <div class="goal-sub">${w.toFixed(1)} кг — ты дошёл до целевого веса.<br>Огромная работа. Горжусь!</div>
    <button class="btn-primary" style="max-width:260px;margin-top:26px" data-act="closeGoal">Продолжить</button>`;
  document.body.appendChild(ov);
  haptic('ok');
}

/* шагомер на датчиках движения (считает, пока приложение открыто) */
let motionOn = false, lastStepT = 0, lastMag = 9.8;
function onMotion(e){
  const a = e.accelerationIncludingGravity;
  if(!a) return;
  const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
  const now = Date.now();
  if(mag - lastMag > 2.2 && now - lastStepT > 350){
    lastStepT = now;
    const ds = todayStr();
    S.stepsLog[ds] = (S.stepsLog[ds]||0) + 1;
    save();
    const el = document.querySelector('.steps-num');
    if(el) el.textContent = S.stepsLog[ds].toLocaleString('ru-RU');
  }
  lastMag = lastMag*0.7 + mag*0.3;
}
ACTIONS.syncSteps = async ()=>{
  try{
    if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
      const perm = await DeviceMotionEvent.requestPermission(); // запрос разрешения на iPhone
      if(perm !== 'granted'){ showToast('Доступ к датчикам не разрешён'); return; }
    }
    if(!motionOn){
      window.addEventListener('devicemotion', onMotion);
      motionOn = true;
    }
    showToast('Датчики подключены — шаги считаются, пока приложение открыто');
    haptic('ok');
  }catch(e){ showToast('Датчики движения недоступны — введи шаги вручную'); }
};

/* ================= Ранжирование как в рекомендациях ================= */
function freqKey(name){ return name.toLowerCase().trim(); }
function bumpFreq(food){
  const key = freqKey(food.name);
  const e = S.foodFreq[key] || {n:0, last:null, food:null};
  e.n++; e.last = todayStr();
  e.food = {name:food.name, emoji:food.emoji||'🍽', per100:food.per100||null, fixed:food.fixed||null};
  S.foodFreq[key] = e;
}
function freqScore(name){
  const e = S.foodFreq[freqKey(name)];
  if(!e) return 0;
  const days = Math.max(0, Math.round((Date.now() - new Date(e.last+'T00:00:00').getTime())/86400000));
  const recency = days<=1?6 : days<=3?3 : days<=7?1 : 0;
  return e.n*3 + recency;
}
function rankFoods(list){ return [...list].sort((a,b)=>freqScore(b.name)-freqScore(a.name)); }

let offAbort = 0;
function doFoodSearch(q){
  const box = document.getElementById('searchResults');
  if(!box) return;
  q = (q||'').trim().toLowerCase();
  const local = FOOD_DB.concat(S.customFoods).filter(f=>!q || f.name.toLowerCase().includes(q));
  const ranked = rankFoods(local).slice(0, q? 30 : 12);
  box.innerHTML = (q?'':'<div class="result-source">Часто выбираемое и база продуктов (работает без интернета)</div>')
    + ranked.map(f=>foodResultHtml(f)).join('')
    + (q && q.length>=3 ? '<div class="result-source" id="offStatus"><span class="spinner"></span> Ищу в базе Open Food Facts…</div><div id="offResults"></div>' : '');
  if(q && q.length>=3){
    const my = ++offAbort;
    searchOpenFoodFacts(q).then(list=>{
      if(my!==offAbort) return;
      const st = document.getElementById('offStatus');
      const res = document.getElementById('offResults');
      if(!st || !res) return;
      if(!list.length){ st.textContent = 'В онлайн-базе ничего не нашлось'; return; }
      st.textContent = 'Из базы Open Food Facts:';
      res.innerHTML = rankFoods(list).slice(0,10).map(f=>foodResultHtml(f)).join('');
    }).catch(()=>{
      const st = document.getElementById('offStatus');
      if(st && my===offAbort) st.textContent = 'Нет интернета — показана локальная база';
    });
  }
}

/* ================= Сканер штрихкодов ================= */
let scannerActive = false;
function stopScanner(){
  if(scannerActive && window.Quagga){ try{ Quagga.stop(); }catch(e){} }
  scannerActive = false;
}
function loadQuagga(){
  return new Promise((res, rej)=>{
    if(window.Quagga) return res();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
async function startScanner(){
  const status = document.getElementById('scanStatus');
  try{
    await loadQuagga();
    Quagga.init({
      inputStream:{ name:'Live', type:'LiveStream', target:document.querySelector('.scan-box'),
        constraints:{ facingMode:'environment' } },
      decoder:{ readers:['ean_reader','ean_8_reader','upc_reader'] },
      locate:true
    }, (err)=>{
      if(err){ if(status) status.textContent = 'Камера недоступна — введи код вручную'; return; }
      scannerActive = true;
      Quagga.start();
      let lastCode = '', hits = 0;
      Quagga.onDetected((data)=>{
        const code = data.codeResult.code;
        if(code===lastCode) hits++; else { lastCode = code; hits = 1; }
        if(hits>=3){ stopScanner(); handleBarcode(code); }
      });
    });
  }catch(e){ if(status) status.textContent = 'Сканер не загрузился (нет интернета?) — введи код вручную'; }
}
ACTIONS.manualBarcode = ()=>{
  const code = document.getElementById('manualCode').value.trim();
  if(code.length<8){ showToast('Код слишком короткий'); return; }
  handleBarcode(code);
};
async function handleBarcode(code){
  haptic('medium');
  const status = document.getElementById('scanStatus');
  if(status) status.innerHTML = '<span class="spinner"></span> Ищу продукт ' + escapeHtml(code) + '…';
  try{
    const f = await lookupBarcodeOFF(code);
    const box = document.getElementById('scanResult');
    if(!f){ if(status) status.textContent = 'Продукт не найден в базе'; return; }
    if(status) status.textContent = 'Найдено:';
    if(box) box.innerHTML = foodResultHtml(f, 'Open Food Facts');
  }catch(e){ if(status) status.textContent = 'Нет интернета — поиск по штрихкоду недоступен'; }
}

/* ================= Аналитика ================= */
function weightRegression(entries){
  if(entries.length<2) return null;
  const t0 = new Date(entries[0].date+'T00:00:00').getTime();
  const pts = entries.map(e=>({x:(new Date(e.date+'T00:00:00').getTime()-t0)/86400000, y:e.weight}));
  const n = pts.length;
  const sx = pts.reduce((s,p)=>s+p.x,0), sy = pts.reduce((s,p)=>s+p.y,0);
  const sxy = pts.reduce((s,p)=>s+p.x*p.y,0), sxx = pts.reduce((s,p)=>s+p.x*p.x,0);
  const denom = n*sxx - sx*sx;
  if(Math.abs(denom)<1e-9) return null;
  return (n*sxy - sx*sy)/denom; // кг в день
}
function weightChartSvg(entries, slope){
  if(entries.length<2) return '<div class="empty-hint">Нужно минимум две записи веса, чтобы построить график</div>';
  const W=340, H=150, pad=10;
  const target = S.profile.targetWeight;
  const t0 = new Date(entries[0].date+'T00:00:00').getTime();
  const lastT = new Date(entries[entries.length-1].date+'T00:00:00').getTime();
  const spanDays = Math.max((lastT-t0)/86400000, 1);
  const projDays = (slope && slope<0) ? Math.min((entries[entries.length-1].weight - target)/(-slope), 60) : 0;
  const totalDays = spanDays + Math.max(projDays,0);
  let min = Math.min(...entries.map(e=>e.weight), target||99999);
  let max = Math.max(...entries.map(e=>e.weight));
  const range = Math.max(max-min, 1); min -= range*0.12; max += range*0.12;
  const X = d => pad + ((new Date(d+'T00:00:00').getTime()-t0)/86400000)/totalDays*(W-2*pad);
  const Y = w => H-pad - (w-min)/(max-min)*(H-2*pad);
  const line = entries.map((e,i)=>`${i?'L':'M'}${X(e.date).toFixed(1)},${Y(e.weight).toFixed(1)}`).join(' ');
  const lastX = X(entries[entries.length-1].date), lastY = Y(entries[entries.length-1].weight);
  let proj = '';
  if(projDays>0){
    const px = pad + (spanDays+projDays)/totalDays*(W-2*pad);
    const py = Y(entries[entries.length-1].weight + slope*projDays);
    proj = `<line x1="${lastX.toFixed(1)}" y1="${lastY.toFixed(1)}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="var(--accent-2)" stroke-width="2" stroke-dasharray="5 5" opacity=".7"/>`;
  }
  const goalLine = target? `<line x1="${pad}" y1="${Y(target).toFixed(1)}" x2="${W-pad}" y2="${Y(target).toFixed(1)}" stroke="var(--green)" stroke-width="1" stroke-dasharray="3 4" opacity=".65"/>` : '';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
    ${goalLine}
    <path d="${line}" fill="none" stroke="url(#gradW)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${proj}
    <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="var(--accent-1)"/>
    <defs><linearGradient id="gradW" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="var(--accent-1)"/><stop offset="100%" stop-color="var(--accent-2)"/></linearGradient></defs>
  </svg>`;
}
function renderStatsTab(){

  const avgP = withFood.length? Math.round(withFood.reduce((s,d)=>s+dayMacro(d,'p'),0)/withFood.length) : 0;
  const cutoff = todayStr(new Date(Date.now()-30*86400000));
  const w30 = S.weightLog.filter(e=>e.date>=cutoff).sort((a,b)=>a.date.localeCompare(b.date));
  const wAll = [...S.weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const avgW = w30.length? r1(w30.reduce((s,e)=>s+e.weight,0)/w30.length) : (wAll.length? wAll[wAll.length-1].weight : p.weight);
  const slope = weightRegression(w30.length>=2? w30 : wAll);
  const pace = slope!=null? slope*7 : null;
  const lastW = wAll.length? wAll[wAll.length-1].weight : p.weight;
  let daysLeft = null;
  if(slope!=null && slope<-0.005 && lastW>p.targetWeight) daysLeft = Math.ceil((lastW-p.targetWeight)/(-slope));
  const forecastDate = daysLeft!=null? fmtDate(todayStr(new Date(Date.now()+daysLeft*86400000))) : null;
  const si = streakInfo();

  /* календарь 30 дней */
  const today = todayStr();
  let cal = '';

  arr.forEach(d=>{
    let cls = '';
    if(si.frozen.has(d)) cls = 'frozen';
    else if(dayItems(d).length){
      const def = dayDeficit(d);
      if(def <= -1100) cls = 'warn';
      else if(def <= 100) cls = 'ok';
      else if(def <= 350) cls = 'warn';
      else cls = 'bad';
    }

  return `
    <div class="topbar"><div class="topbar-title">Аналитика</div><div class="topbar-sub">За последние 30 дней</div></div>
    <div class="screen">
      <div class="stat-grid">
        <div class="stat-card rise"><div class="stat-lbl">Средний дефицит</div><div class="stat-val" style="color:${avgDef<0?'var(--green)':'var(--red)'}">${avgDef<=0?'−':'+'}${Math.abs(avgDef)} ккал</div></div>
        <div class="stat-card rise" style="animation-delay:.04s"><div class="stat-lbl">Средний белок</div><div class="stat-val">${avgP} г</div></div>
        <div class="stat-card rise" style="animation-delay:.08s;grid-column:1/-1"><div class="stat-lbl">Средний вес</div><div class="stat-val">${avgW} кг</div></div>
      </div>

      <div class="forecast-card rise" style="animation-delay:.15s">
        ${daysLeft!=null
          ? `<div class="forecast-lbl">До цели ${p.targetWeight} кг осталось</div><div class="forecast-num">${daysLeft} ${daysLeft%10===1&&daysLeft%100!==11?'день':(daysLeft%10>=2&&daysLeft%10<=4&&(daysLeft%100<10||daysLeft%100>=20)?'дня':'дней')}</div><div class="forecast-lbl">примерно ${forecastDate}, если держать темп</div>`
          : `<div class="forecast-lbl">Прогноз достижения цели</div><div class="forecast-num" style="font-size:22px">Нужно больше данных</div><div class="forecast-lbl">записывай вес хотя бы раз в 2–3 дня</div>`}
      </div>

      ${S.bodyFat
        ? `<div class="fat-card rise" style="animation-delay:.17s"><div><div class="stat-lbl" style="margin-top:0">Текущий % жира</div><div class="stat-val">~${S.bodyFat.pct}</div></div><button class="mini-btn" data-act="openFatCalc" title="Пересчитать">${ic('restore')}</button></div>`
        : `<button class="fat-btn rise" style="animation-delay:.17s" data-act="openFatCalc">Рассчитать % жира</button>`}

      <div class="card rise" style="animation-delay:.18s">
        <div class="weight-hero">
          <div><div class="weight-hero-num">${lastW} кг</div><div class="weight-trend">${pace!=null && pace<0? 'снижение идёт' : 'текущий вес'} · цель ${p.targetWeight} кг</div></div>
          <button class="log-weight-btn" data-act="openLogWeight">Записать вес</button>
        </div>
        <div class="chart-holder">${weightChartSvg(w30.length>=2? w30 : wAll, slope)}</div>
      </div>

      <div class="section-title">Календарь сушки</div>
      <div class="card rise" style="animation-delay:.2s">
        <div class="calendar-grid">${cal}</div>
        <div class="cal-legend"><span><i class="cal-dot ok"></i>в норме</span><span><i class="cal-dot warn"></i>отклонение</span><span><i class="cal-dot bad"></i>перебор</span><span><i class="cal-dot frozen"></i>заморозка</span></div>
      </div>
      ${si.display>0?`<div class="advice-card rise" style="animation-delay:.22s"><div class="advice-head"><span class="advice-dot"></span>Стрик</div><div class="advice-text">${si.display}-й день подряд. Доступно 3 заморозки в месяц, так что пропущенный день не сломает огонёк</div></div>`:''}
    </div>`;
}

    <div class="modal-text" style="margin-bottom:12px">Измерь обхваты сантиметровой лентой — посчитаем по методу ВМС США с учётом твоего роста и пола</div>
    <div class="field-row"><div class="field-row-lbl">Обхват талии, см</div><input class="field-row-input" id="bfWaist" type="number" inputmode="decimal" value="${bf.waist||''}"></div>
    <div class="field-row"><div class="field-row-lbl">Обхват шеи, см</div><input class="field-row-input" id="bfNeck" type="number" inputmode="decimal" value="${bf.neck||''}"></div>
    <div class="field-row"><div class="field-row-lbl">Обхват груди, см</div><input class="field-row-input" id="bfChest" type="number" inputmode="decimal" value="${bf.chest||''}"></div>
    <div class="field-row"><div class="field-row-lbl">Обхват бёдер, см</div><input class="field-row-input" id="bfHip" type="number" inputmode="decimal" value="${bf.hip||''}"></div>
    <button class="btn-primary" style="margin-top:16px" data-act="calcFat">Рассчитать</button>`);
};
ACTIONS.calcFat = ()=>{
  const v = id=>parseFloat(String(document.getElementById(id).value).replace(',','.'));
  const waist = v('bfWaist'), neck = v('bfNeck'), chest = v('bfChest'), hip = v('bfHip');
  if(!(waist>=40)||!(neck>=20)||!(chest>=50)||!(hip>=50)){ showToast('Проверь замеры — все обхваты в сантиметрах'); return; }
  const male = S.profile.gender!=='female';
  const h = S.profile.height;
  let pct;
  if(male){
    if(waist<=neck){ showToast('Талия должна быть больше обхвата шеи — проверь замеры'); return; }
    pct = 495/(1.0324 - 0.19077*Math.log10(waist-neck) + 0.15456*Math.log10(h)) - 450;
  } else {
    if(waist+hip<=neck){ showToast('Проверь замеры — что-то введено неверно'); return; }
    pct = 495/(1.29579 - 0.35004*Math.log10(waist+hip-neck) + 0.22100*Math.log10(h)) - 450;
  }
  if(!isFinite(pct) || pct<3 || pct>65){ showToast('Не получилось посчитать — проверь замеры'); return; }
  pct = r1(pct);
  S.bodyFat = { pct, waist, neck, chest, hip, date: todayStr() };
  /* цель сушки: парням ~10% жира, девушкам 20% */
  const targetBf = male ? 10 : 20;
  if(pct > targetBf){
    const lean = S.profile.weight * (1 - pct/100);
    S.profile.targetWeight = r1(lean / (1 - targetBf/100));
  }
  save(true); haptic('ok'); closeModal(); renderTab(); checkGoalReached();
  showToast(`Твой % жира: ~${pct} · цель — ${S.profile.targetWeight} кг`);
};

/* ================= Импорт истории (мастер) ================= */
ACTIONS.openImport = ()=>{
  openSheet(`
    <div class="sheet-title">Импорт истории сушки</div>
    <div class="modal-text">Уже какое-то время на сушке? Добавь прошлые дни — приложение восстановит стрик, графики, средний дефицит и прогноз. Обязательны только калории; вес и БЖУ — по желанию, с ними статистика будет детальнее</div>
    <div class="actions-grid" style="margin-top:14px">
      <button class="btn-primary" data-act="importByDays">Заполнить по дням</button>
      <button class="btn-secondary" data-act="importByText">Вставить текстом (хоть 200 дней)</button>
    </div>`);
};
ACTIONS.importByDays = ()=>{
  openSheet(`
    <div class="sheet-title">Импорт по дням</div>
    <div class="field-label">Сколько дней добавить? (1–200)</div>
    <div class="manual-barcode-row">
      <input class="plain-input" id="impCount" type="number" inputmode="numeric" placeholder="18">
      <button class="btn-secondary" style="width:auto;padding:0 18px" data-act="buildImportRows">Далее</button>
    </div>
    <div id="impRows"></div>`);
};
ACTIONS.buildImportRows = ()=>{
  const n = Math.max(1, Math.min(200, parseInt(document.getElementById('impCount').value)||0));
  if(!n){ showToast('Введи число дней'); return; }
  let rows = '';
  for(let i=1;i<=n;i++){
    const ds = todayStr(new Date(Date.now()-i*86400000));
    rows += `
      <div class="import-day" data-date="${ds}">
        <div class="import-day-title">${fmtDateShort(ds)}${i===1?' · вчера':''}</div>
        <div class="import-row2">
          <input class="plain-input imp-kcal" type="number" inputmode="numeric" placeholder="ккал*">
          <input class="plain-input imp-w" type="number" inputmode="decimal" placeholder="вес">
          <input class="plain-input imp-p" type="number" inputmode="numeric" placeholder="Б">
          <input class="plain-input imp-f" type="number" inputmode="numeric" placeholder="Ж">
          <input class="plain-input imp-c" type="number" inputmode="numeric" placeholder="У">
        </div>
      </div>`;
  }
  document.getElementById('impRows').innerHTML = rows + `<button class="btn-primary" style="margin-top:12px" data-act="applyImportRows">Импортировать</button>`;
};
ACTIONS.applyImportRows = ()=>{
  const days = [];
  document.querySelectorAll('.import-day').forEach(row=>{
    const kcal = parseFloat(row.querySelector('.imp-kcal').value);
    if(!(kcal>0)) return;
    days.push({
      date: row.dataset.date, kcal:Math.round(kcal),
      weight: parseFloat(row.querySelector('.imp-w').value)||null,
      p: parseFloat(row.querySelector('.imp-p').value)||0,
      f: parseFloat(row.querySelector('.imp-f').value)||0,
      c: parseFloat(row.querySelector('.imp-c').value)||0
    });
  });
  applyImport(days);
};
ACTIONS.importByText = ()=>{
  openSheet(`
    <div class="sheet-title">Импорт текстом</div>
    <div class="modal-text">Каждая строка — один день, сверху самый давний, нижняя строка = вчера.<br>Формат: <b>ккал</b> [вес] [Б Ж У]<br>Пример: «1850 79.4 180 55 160» или просто «1850»</div>
    <textarea class="plain-input" id="impText" rows="9" style="height:auto;padding-top:12px;font-family:inherit" placeholder="1900\n1850 80.1\n1800 79.8 175 50 150"></textarea>
    <div class="kcal-preview" id="impPreview"></div>
    <button class="btn-primary" style="margin-top:12px" data-act="applyImportText">Импортировать</button>`);
  const ta = document.getElementById('impText');
  ta.oninput = ()=>{
    const n = parseImportText(ta.value).length;
    document.getElementById('impPreview').textContent = n? `Распознано дней: ${n}. После импорта сегодня будет ${n+1}-й день подряд` : '';
  };
};
function parseImportText(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>/\d/.test(l)).slice(0,200);
  const out = [];
  lines.forEach((line, idx)=>{
    const nums = (line.match(/-?\d+[.,]?\d*/g)||[]).map(x=>parseFloat(x.replace(',','.')));
    if(!nums.length || !(nums[0]>0)) return;
    const daysAgo = lines.length - idx; // нижняя строка = вчера
    out.push({
      date: todayStr(new Date(Date.now()-daysAgo*86400000)),
      kcal: Math.round(nums[0]),
      weight: (nums[1]>=30 && nums[1]<=300)? r1(nums[1]) : null,
      p: nums[2]||0, f: nums[3]||0, c: nums[4]||0
    });
  });
  return out;
}
ACTIONS.applyImportText = ()=>{ applyImport(parseImportText(document.getElementById('impText').value)); };
function applyImport(days){
  if(!days.length){ showToast('Нет ни одного дня с калориями'); return; }
  let added = 0;
  days.forEach(d=>{
    if(!(S.foodLog[d.date]||[]).length){
      S.foodLog[d.date] = [{ name:'Импорт истории', emoji:'📥', time:'12:00', kcal:d.kcal,
        p:d.p, c:d.c, f:d.f, na:Math.round(d.kcal*0.9), k:Math.round(d.kcal*1.2), imported:true }];
      added++;
    }
    if(d.weight) upsertWeight(d.date, d.weight);
  });
  save(true); haptic('ok'); closeSheet();
  const si = streakInfo();
  showToast(`Импортировано дней: ${added}. Сейчас ${si.display}-й день подряд`);
  ui.tab = 'stats'; renderTab();
}

/* ================= Экспорт / восстановление / сброс ================= */
ACTIONS.exportData = ()=>{
  const json = JSON.stringify(S);
  openSheet(`
    <div class="sheet-title">Резервная копия</div>
    <div class="modal-text">Скопируй текст и сохрани в заметках или «Избранном» Telegram. Через «Восстановить из копии» можно вернуть все данные на любом устройстве</div>
    <textarea class="plain-input" id="expText" rows="7" readonly style="height:auto;padding-top:12px;font-size:12px">${escapeHtml(json)}</textarea>
    <button class="btn-primary" style="margin-top:12px" data-act="copyExport">Скопировать</button>`);
};
ACTIONS.copyExport = ()=>{
  const ta = document.getElementById('expText');
  ta.select(); ta.setSelectionRange(0, 9999999);
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){}
  if(!ok && navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(()=>showToast('Скопировано')).catch(()=>showToast('Выдели и скопируй вручную')); }
  else showToast(ok?'Скопировано':'Выдели и скопируй вручную');
  haptic('ok');
};
ACTIONS.openRestore = ()=>{
  openSheet(`
    <div class="sheet-title">Восстановление</div>
    <div class="modal-text">Вставь текст резервной копии. Текущие данные будут заменены</div>
    <textarea class="plain-input" id="restText" rows="7" style="height:auto;padding-top:12px;font-size:12px" placeholder='{"profile":{...}}'></textarea>
    <button class="btn-primary" style="margin-top:12px" data-act="applyRestore">Восстановить</button>`);
};
ACTIONS.applyRestore = ()=>{
  try{
    const data = JSON.parse(document.getElementById('restText').value);
    if(!data || typeof data!=='object' || !data.profile) throw new Error('bad');
    S = Object.assign({ foodLog:{}, weightLog:[], customFoods:[], foodFreq:{}, waterLog:{}, stepsLog:{}, workoutLog:{}, theme:{dark:null,accent:'orange'}, goalShown:false }, data);
    save(true); applyTheme(); closeSheet(); haptic('ok');
    showToast('Данные восстановлены');
    ui.tab = 'home'; renderMain();
  }catch(e){ showToast('Не получилось прочитать копию — проверь текст'); }
};
ACTIONS.resetAll = ()=>{
  openModal(`
    <div class="modal-title">Сбросить всё?</div>
    <div class="modal-text">Профиль, история еды, вес и тренировки будут удалены безвозвратно. Сначала сделай резервную копию</div>
    <button class="btn-primary" style="margin-top:14px;background:var(--red)" data-act="confirmReset">Да, удалить всё</button>
    <button class="btn-secondary" style="margin-top:8px" data-act="closeModal">Отмена</button>`);
};
ACTIONS.confirmReset = async ()=>{
  S = { profile:null, foodLog:{}, weightLog:[], customFoods:[], foodFreq:{}, waterLog:{}, stepsLog:{}, workoutLog:{}, theme:{dark:null,accent:'orange'}, goalShown:false };
  try{ localStorage.removeItem('charge_v2'); }catch(e){}
  if(cloudOK){
    const keys = ['cs_meta']; for(let i=0;i<CS_MAX;i++) keys.push('cs_'+i);
    await csRemoveItems(keys);
  }
  closeModal(); applyTheme();
  renderOnboarding(0);
};

/* ================= Старт ================= */
init();
})();
</script>
